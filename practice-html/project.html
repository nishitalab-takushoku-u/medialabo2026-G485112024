<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>グルメ検索サイト</title>

  <style>

    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      margin: 20px;
    }

    h1 {
      color: orange;
    }

    .search-area {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 5px gray;
      width: 500px;
    }

    select {
      padding: 10px;
      font-size: 16px;
      width: 300px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: orange;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 10px;
    }

    button:hover {
      background-color: darkorange;
    }

    #result {
      margin-top: 30px;
    }

    .shop {
      background-color: white;
      margin-bottom: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 5px gray;
    }

    .shop img {
      width: 250px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

  <h1>グルメ情報検索</h1>

  <div class="search-area">

    <select id="genre">

      <option value="G001">居酒屋</option>
      <option value="G002">ダイニングバー・バル</option>
      <option value="G003">創作料理</option>
      <option value="G004">和食</option>
      <option value="G005">洋食</option>
      <option value="G006">イタリアン・フレンチ</option>
      <option value="G007">中華</option>
      <option value="G008">焼肉・ホルモン</option>
      <option value="G009">アジア・エスニック料理</option>
      <option value="G010">各国料理</option>
      <option value="G011">カラオケ・パーティ</option>
      <option value="G012">バー・カクテル</option>
      <option value="G013">ラーメン</option>
      <option value="G014">カフェ・スイーツ</option>
      <option value="G015">その他グルメ</option>
      <option value="G016">お好み焼き・もんじゃ</option>
      <option value="G017">韓国料理</option>

    </select>

    <button onclick="searchGourmet()">
      検索
    </button>

  </div>

  <div id="result">
    検索結果がここに表示されます
  </div>

  <script src="gourmet.js"></script>

</body>
</html>
